<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;
  --purple:#bc8cff;--cyan:#79c0ff;--accent:#1f6feb;--accent2:#388bfd;
  --page-w:900px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;height:52px}
.topbar-logo{font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:.05em;white-space:nowrap}
.topbar-sep{color:var(--border2);font-size:18px}
.topbar-info{font-size:13px;color:var(--text2);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.topbar-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap}
.badge-area{background:#161f2e;color:var(--blue);border:1px solid #1f4b6e}
.badge-prog{background:#0d1f0d;color:var(--green);border:1px solid #1d4a1d}
.badge-diff{background:#2a1f0d;color:var(--orange);border:1px solid #5a3e10}
.progress-bar-wrap{position:fixed;top:52px;left:0;right:0;z-index:99;height:3px;background:var(--bg3)}
.progress-bar-fill{height:3px;background:linear-gradient(90deg,var(--accent),var(--blue));transition:width .4s ease}
.main{max-width:var(--page-w);margin:0 auto;padding:80px 24px 120px}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.q-card-header{padding:18px 24px 14px;border-bottom:1px solid var(--border);background:var(--bg3);display:flex;align-items:flex-start;gap:14px}
.q-number-block{background:var(--accent);color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;white-space:nowrap}
.q-meta{flex:1}
.q-subject-label{font-size:11px;font-weight:600;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.q-text{font-size:16px;line-height:1.75;color:var(--text)}
.q-body{padding:20px 24px}
.section{margin-bottom:20px}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:block;width:3px;height:14px;border-radius:2px;background:var(--accent)}
.canvas-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{display:block;max-width:100%;height:auto}
.formula-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 20px;text-align:center;font-size:1.1em;overflow-x:auto}
.formula-small{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;text-align:center;font-size:.95em;overflow-x:auto}
.formula-label{font-size:11px;color:var(--text3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.steps-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.step-row{display:flex;gap:12px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.6}
.step-math{font-size:13px;color:var(--cyan);font-family:'Courier New',monospace}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:var(--bg4);padding:8px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border2)}
.data-table td{padding:8px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--bg3)}
.td-mono{font-family:'Courier New',monospace;color:var(--cyan)}
.td-ok{color:var(--green);font-weight:600}
.td-bad{color:var(--red)}
.td-calc{color:var(--blue)}
.td-num{text-align:right;font-family:'Courier New',monospace}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:620px){.split,.formula-grid{grid-template-columns:1fr}}
.chem-eq{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:14px 0}
.chem-molecule{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:16px;font-weight:600;text-align:center;min-width:80px}
.chem-arrow{font-size:22px;color:var(--text3)}
.chem-plus{font-size:18px;color:var(--text3)}
.chem-coef{font-size:11px;color:var(--text3);margin-bottom:3px;text-align:center;letter-spacing:.05em}
.concept-map{display:flex;flex-direction:column;gap:8px}
.concept-node{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);position:relative}
.concept-node.main{border-color:var(--accent);color:var(--blue);font-weight:600}
.concept-node.support{border-color:var(--green);color:#9dc99d}
.concept-node.warn{border-color:var(--orange);color:#d9b060}
.concept-node::before{content:'▶';position:absolute;left:-16px;color:var(--border2);font-size:10px;top:50%;transform:translateY(-50%)}
.concept-node:first-child::before{display:none}
.text-passage{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 18px;font-size:14px;line-height:1.8;color:var(--text2);margin-bottom:12px}
.text-passage .hl-blue{color:var(--blue);font-weight:600}
.text-passage .hl-orange{color:var(--orange);font-weight:600}
.text-passage .hl-green{color:var(--green);font-weight:600}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%}
.options-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;background:var(--bg2);user-select:none}
.option:hover{border-color:var(--border2);background:var(--bg3)}
.option.selected{border-color:var(--accent2);background:#0c1929}
.option.correct{border-color:var(--green);background:#071a07}
.option.wrong{border-color:var(--red);background:#1a0707}
.opt-letter{width:30px;height:30px;border-radius:6px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text2);font-family:'Courier New',monospace;transition:all .15s}
.option.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#fff}
.option.correct .opt-letter{background:var(--green);border-color:var(--green);color:#0d1117;font-size:16px}
.option.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.opt-text{font-size:14px;color:var(--text);line-height:1.6;padding-top:4px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-success{background:#1a4a1a;color:var(--green);border:1px solid #2a6a2a}
.btn-success:hover{background:#1f5a1f}
.explanation{margin-top:14px;padding:14px 18px;background:#071a07;border:1px solid #1d4a1d;border-radius:8px;display:none}
.explanation.show{display:block}
.expl-title{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.expl-text{font-size:14px;color:#9dc99d;line-height:1.75}
.divider{height:1px;background:var(--border);margin:18px 0}
.graph-container{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;overflow:hidden}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg2);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px}
.nav-counter{font-size:13px;color:var(--text2);font-family:'Courier New',monospace;flex:1;text-align:center}
.nav-dots{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap;max-width:440px;max-height:48px;overflow:hidden}
.nav-dot{width:22px;height:22px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);font-size:9px;font-family:'Courier New',monospace;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;flex-shrink:0}
.nav-dot:hover{border-color:var(--border2);color:var(--text2)}
.nav-dot.answered-ok{background:#071a07;border-color:#1d4a1d;color:var(--green)}
.nav-dot.answered-bad{background:#1a0707;border-color:#4a1d1d;color:var(--red)}
.nav-dot.current{background:var(--accent);border-color:var(--accent2);color:#fff;font-weight:700}
.area-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tag-mat{background:#1a2a1a;color:#3fb950;border:1px solid #2d4a2d}
.tag-fis{background:#1a1a2e;color:#79c0ff;border:1px solid #2d2d4a}
.tag-qui{background:#2e1a2e;color:#bc8cff;border:1px solid #4a2d4a}
.tag-bio{background:#1a2e1a;color:#56d364;border:1px solid #2d4a2d}
.tag-lec{background:#2e2a1a;color:#d29922;border:1px solid #4a3e2d}
.tag-soc{background:#2e1a1a;color:#f85149;border:1px solid #4a2d2d}
.tag-ing{background:#1a2e2e;color:#79c0ff;border:1px solid #2d4a4a}
</style>

<script>
// ── Retina-ready canvas helper ──────────────────────────────────────────────
function C(id, w, h) {
  const cv = document.getElementById(id);
  if (!cv) return null;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = w * dpr; cv.height = h * dpr;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  return ctx;
}
function grid(ctx, ox, oy, cols, rows, sz, color='#1e2530') {
  ctx.strokeStyle = color; ctx.lineWidth = 0.5;
  for (let i = 0; i <= cols; i++) { ctx.beginPath(); ctx.moveTo(ox + i*sz, oy); ctx.lineTo(ox + i*sz, oy + rows*sz); ctx.stroke(); }
  for (let i = 0; i <= rows; i++) { ctx.beginPath(); ctx.moveTo(ox, oy + i*sz); ctx.lineTo(ox + cols*sz, oy + i*sz); ctx.stroke(); }
}
function arrow(ctx, x1,y1,x2,y2,color='#58a6ff',lw=2) {
  const angle = Math.atan2(y2-y1, x2-x1);
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lw;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 8*Math.cos(angle-0.35), y2 - 8*Math.sin(angle-0.35));
  ctx.lineTo(x2 - 8*Math.cos(angle+0.35), y2 - 8*Math.sin(angle+0.35));
  ctx.closePath(); ctx.fill();
}

// ── PREGUNTAS ────────────────────────────────────────────────────────────────
const PREGUNTAS = [

// ─── Q1 GEOMETRÍA — Pitágoras ────────────────────────────────────────────────
{
  id:1, area:'Matemáticas', tema:'Geometría', subtema:'Teorema de Pitágoras', dificultad:'Media',
  enunciado:'En el triángulo rectángulo ABC, el cateto AB = 6 cm y el cateto BC = 8 cm. ¿Cuánto mide la hipotenusa AC y cuál es el área del triángulo?',
  opciones:['AC = 8 cm  y  Área = 20 cm²','AC = 10 cm  y  Área = 24 cm²','AC = 12 cm  y  Área = 30 cm²','AC = 10 cm  y  Área = 48 cm²'],
  correcta:1,
  explicacion:'Pitágoras: c² = 6² + 8² = 36 + 64 = 100 → c = 10 cm. Área = (base × altura)/2 = (6 × 8)/2 = 24 cm².',
  render(cont){
    cont.innerHTML=`
<div class="section">
  <div class="section-title">📐 Figura geométrica con medidas</div>
  <div class="split">
    <div class="canvas-box"><canvas id="cg1" width="250" height="210"></canvas></div>
    <div class="steps-box">
      <div class="step-row"><div class="step-num">1</div><div class="step-text"><b>Datos:</b> cateto a = <span class="step-math">6 cm</span>, cateto b = <span class="step-math">8 cm</span></div></div>
      <div class="step-row"><div class="step-num">2</div><div class="step-text"><b>Fórmula:</b> <span class="step-math">c² = a² + b²</span></div></div>
      <div class="step-row"><div class="step-num">3</div><div class="step-text"><b>Sustitución:</b> <span class="step-math">c² = 36 + 64 = 100</span></div></div>
      <div class="step-row"><div class="step-num">4</div><div class="step-text"><b>Hipotenusa:</b> <span class="step-math">c = √100 = 10 cm</span></div></div>
      <div class="step-row"><div class="step-num">5</div><div class="step-text"><b>Área:</b> <span class="step-math">A = (6×8)/2 = 24 cm²</span></div></div>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-title">📊 Tabla de medidas</div>
  <table class="data-table">
    <thead><tr><th>Lado</th><th>Símbolo</th><th>Valor</th><th>Fórmula</th><th>Estado</th></tr></thead>
    <tbody>
      <tr><td>Cateto horizontal</td><td class="td-mono">a (AB)</td><td class="td-num">6 cm</td><td class="td-mono">—</td><td class="td-ok">✓ Dato</td></tr>
      <tr><td>Cateto vertical</td><td class="td-mono">b (BC)</td><td class="td-num">8 cm</td><td class="td-mono">—</td><td class="td-ok">✓ Dato</td></tr>
      <tr><td>Hipotenusa</td><td class="td-mono">c (AC)</td><td class="td-num td-calc">10 cm</td><td class="td-mono">√(a²+b²)</td><td class="td-calc">Calculado</td></tr>
      <tr><td>Área</td><td class="td-mono">A</td><td class="td-num td-calc">24 cm²</td><td class="td-mono">(a×b)/2</td><td class="td-calc">Calculado</td></tr>
    </tbody>
  </table>
</div>`;
    const ctx = C('cg1',250,210); if(!ctx) return;
    const ox=30,oy=175,s=20;
    grid(ctx,ox,oy-8*s,8,9,s);
    // Fill
    ctx.fillStyle='rgba(88,166,255,0.1)';
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+6*s,oy);ctx.lineTo(ox+6*s,oy-8*s);ctx.closePath();ctx.fill();
    // Triangle edges
    ctx.strokeStyle='#58a6ff';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+6*s,oy);ctx.lineTo(ox+6*s,oy-8*s);ctx.closePath();ctx.stroke();
    // Right angle mark
    ctx.strokeStyle='#79c0ff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ox+6*s-12,oy);ctx.lineTo(ox+6*s-12,oy-12);ctx.lineTo(ox+6*s,oy-12);ctx.stroke();
    // Dimension arrows
    arrow(ctx,ox,oy+14,ox+6*s,oy+14,'#3fb950',1.5);
    arrow(ctx,ox+6*s,oy+14,ox,oy+14,'#3fb950',1.5);
    arrow(ctx,ox+6*s+14,oy,ox+6*s+14,oy-8*s,'#3fb950',1.5);
    arrow(ctx,ox+6*s+14,oy-8*s,ox+6*s+14,oy,'#3fb950',1.5);
    // Labels
    ctx.font='bold 13px Segoe UI,sans-serif'; ctx.fillStyle='#e6edf3';
    ctx.fillText('A',ox-16,oy+5); ctx.fillText('B',ox+6*s+4,oy+5); ctx.fillText('C',ox+6*s+4,oy-8*s-6);
    ctx.font='bold 12px Courier New,monospace';
    ctx.fillStyle='#3fb950'; ctx.fillText('6 cm',ox+2.5*s-14,oy+26);
    ctx.fillStyle='#3fb950'; ctx.fillText('8 cm',ox+6*s+18,oy-4*s+4);
    ctx.fillStyle='#f85149'; ctx.font='bold 13px Courier New,monospace';
    ctx.save(); ctx.translate(ox+2.5*s-30,oy-4.5*s+10); ctx.rotate(-Math.atan2(8,6)); ctx.fillText('? = 10 cm',0,0); ctx.restore();
  }
},

// ─── Q2 GEOMETRÍA — Círculo ──────────────────────────────────────────────────
{
  id:2, area:'Matemáticas', tema:'Geometría', subtema:'Círculo y circunferencia', dificultad:'Fácil',
  enunciado:'Un círculo tiene radio r = 7 cm. Calcula el área y la longitud de la circunferencia. Usa π ≈ 3.1416.',
  opciones:['Área = 153.94 cm²  y  C = 43.98 cm','Área = 49 cm²  y  C = 14 cm','Área = 153.94 cm²  y  C = 21.99 cm','Área = 78 cm²  y  C = 43.98 cm'],
  correcta:0,
  explicacion:'Área = π r² = 3.1416 × 49 = 153.94 cm². Circunferencia = 2πr = 2 × 3.1416 × 7 = 43.98 cm.',
  render(cont){
    cont.innerHTML=`
<div class="section">
  <div class="section-title">🔵 Figura: Círculo con medidas</div>
  <div class="split">
    <div class="canvas-box"><canvas id="cg2" width="220" height="220"></canvas></div>
    <div class="steps-box">
      <div class="step-row"><div class="step-num">1</div><div class="step-text"><b>Dato:</b> radio <span class="step-math">r = 7 cm</span></div></div>
      <div class="step-row"><div class="step-num">2</div><div class="step-text"><b>Área:</b> <span class="step-math">A = π × r²</span></div></div>
      <div class="step-row"><div class="step-num">3</div><div class="step-text"><span class="step-math">A = 3.1416 × 7² = 3.1416 × 49</span></div></div>
      <div class="step-row"><div class="step-num">4</div><div class="step-text"><b>Resultado:</b> <span class="step-math">A = 153.94 cm²</span></div></div>
      <div class="step-row"><div class="step-num">5</div><div class="step-text"><b>Circunf.:</b> <span class="step-math">C = 2π × 7 = 43.98 cm</span></div></div>
    </div>
  </div>
</div>
<div class="section">
  <div class="section-title">📊 Tabla de resultados</div>
  <table class="data-table">
    <thead><tr><th>Medida</th><th>Fórmula</th><th>Sustitución</th><th>Resultado</th></tr></thead>
    <tbody>
      <tr><td>Radio</td><td class="td-mono">r</td><td class="td-num">—</td><td class="td-ok td-num">7 cm</td></tr>
      <tr><td>Diámetro</td><td class="td-mono">2r</td><td class="td-num">2 × 7</td><td class="td-calc td-num">14 cm</td></tr>
      <tr><td>Circunferencia</td><td class="td-mono">2πr</td><td class="td-num">2 × 3.1416 × 7</td><td class="td-calc td-num">43.98 cm</td></tr>

// ── Estado y navegación ──────────────────────────────────────────────────────
const N = PREGUNTAS.length;
const state = { current:0, selected:Array(N).fill(null), answered:Array(N).fill(false) };

function buildDots(){
  const c=document.getElementById('nav-dots'); c.innerHTML='';
  PREGUNTAS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='nav-dot'; d.id='dot-'+i; d.textContent=i+1;
    d.onclick=()=>goTo(i); c.appendChild(d);
  });
}
function updateDots(){
  PREGUNTAS.forEach((_,i)=>{
    const d=document.getElementById('dot-'+i); if(!d)return;
    d.className='nav-dot';
    if(i===state.current) d.className+=' current';
    else if(state.answered[i]) d.className+=state.selected[i]===PREGUNTAS[i].correcta?' answered-ok':' answered-bad';
  });
}
function renderQuestion(idx){
  const q=PREGUNTAS[idx];
  document.getElementById('topbar-info').textContent=`${q.area} › ${q.tema} › ${q.subtema}`;
  document.getElementById('badge-area').textContent=q.area;
  document.getElementById('badge-diff').textContent=q.dificultad;
  const done=state.answered.filter(Boolean).length;
  const ok=state.selected.filter((s,i)=>state.answered[i]&&s===PREGUNTAS[i].correcta).length;
  document.getElementById('badge-prog').textContent=`${ok} ✓ / ${done} respondidas`;
  document.getElementById('progress-fill').style.width=((idx/(N-1))*100)+'%';
  document.getElementById('nav-counter').textContent=`${idx+1} / ${N}`;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').textContent=idx===N-1?'Finalizar':'Siguiente →';
  const container=document.getElementById('question-container');
  container.innerHTML=''; window.scrollTo(0,0);
  const card=document.createElement('div'); card.className='q-card';
  const answered=state.answered[idx];
  card.innerHTML=`
<div class="q-card-header">
  <div class="q-number-block">Pregunta ${idx+1} / ${N}</div>
  <div class="q-meta">
    <div class="q-subject-label">${q.area} · ${q.tema} · ${q.subtema} · <span style="color:var(--text2)">${q.dificultad}</span></div>
    <div class="q-text">${q.enunciado}</div>
  </div>
</div>
<div class="q-body">
  <div id="q-render"></div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title">◉ Selecciona tu respuesta</div>
    <div class="options-list" id="opts"></div>
    <button class="btn btn-primary" id="btn-check" style="margin-top:14px;width:100%">${answered?'Siguiente pregunta →':'Verificar respuesta'}</button>
    <div class="explanation" id="expl"><div class="expl-title">💡 Explicación</div><div class="expl-text">${q.explicacion}</div></div>
  </div>
</div>`;
  container.appendChild(card);
  q.render(document.getElementById('q-render'));
  const optList=document.getElementById('opts');
  ['A','B','C','D'].forEach((letter,i)=>{
    const div=document.createElement('div'); div.className='option';
    if(answered){if(i===q.correcta)div.className+=' correct'; else if(i===state.selected[idx]&&i!==q.correcta)div.className+=' wrong';}
    else if(state.selected[idx]===i)div.className+=' selected';
    div.innerHTML=`<div class="opt-letter">${answered&&i===q.correcta?'✓':letter}</div><div class="opt-text">${q.opciones[i]}</div>`;
    if(!answered)div.onclick=()=>selectOption(idx,i);
    optList.appendChild(div);
  });
  if(answered)document.getElementById('expl').classList.add('show');
  const btn=document.getElementById('btn-check');
  if(!answered){
    btn.disabled=state.selected[idx]===null;
    btn.onclick=()=>checkAnswer(idx);
  } else {
    btn.disabled=false; btn.textContent=idx===N-1?'🏁 Ver resultados':'Siguiente pregunta →';
    btn.className='btn btn-success'; btn.style.width='100%';
    btn.onclick=()=>navigate(1);
  }
}
function selectOption(idx,i){
  if(state.answered[idx])return;
  state.selected[idx]=i;
  document.querySelectorAll('.option').forEach((o,j)=>o.classList.toggle('selected',j===i));
  document.getElementById('btn-check').disabled=false;
}
function checkAnswer(idx){
  state.answered[idx]=true;
  const q=PREGUNTAS[idx], sel=state.selected[idx];
  document.querySelectorAll('.option').forEach((o,i)=>{
    o.classList.remove('selected');
    if(i===q.correcta){o.classList.add('correct');o.querySelector('.opt-letter').textContent='✓';}
    else if(i===sel&&i!==q.correcta)o.classList.add('wrong');
  });
  document.getElementById('expl').classList.add('show');
  const btn=document.getElementById('btn-check');
  btn.textContent=idx===N-1?'🏁 Ver resultados':'Siguiente pregunta →';
  btn.className='btn btn-success'; btn.style.width='100%'; btn.onclick=()=>navigate(1);
  updateDots();
  const done=state.answered.filter(Boolean).length;
  const ok=state.selected.filter((s,i)=>state.answered[i]&&s===PREGUNTAS[i].correcta).length;
  document.getElementById('badge-prog').textContent=`${ok} ✓ / ${done} respondidas`;
}
function goTo(idx){ state.current=idx; updateDots(); renderQuestion(idx); }
function navigate(dir){ const n=state.current+dir; if(n>=0&&n<N)goTo(n); }
buildDots(); updateDots(); renderQuestion(0);
</script>
